<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mari ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
}

/* 🎬 INTRO NETFLIX */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
    color: #e50914;
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 3px;
    animation: introFade 3.5s ease forwards;
}

#intro p {
    font-size: 16px;
    color: #fff;
    margin-top: 10px;
    opacity: 0.7;
}

@keyframes introFade {
    0% { opacity: 0; transform: scale(1.3); }
    20% { opacity: 1; transform: scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
}

/* 🌸 FUNDO PRINCIPAL */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
}

/* 💌 CARTA */
.carta {
    background: white;
    width: 85%;
    max-width: 750px;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);

    opacity: 0;
    transform: scale(0.9);
    animation: aparecerCarta 1.5s ease forwards;
    animation-delay: 3.5s;
}

@keyframes aparecerCarta {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* ✍️ EFEITO ESCRITA */
.texto {
    font-size: 20px;
    line-height: 1.8;
    color: #444;
    white-space: pre-line;
    margin-top: 20px;
}

/* 💖 TÍTULO */
h1 {
    color: #e91e63;
    text-align: center;
}

/* ❤️ CORAÇÕES */
.coracao {
    position: absolute;
    color: white;
    animation: subir 6s linear infinite;
}

@keyframes subir {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-120px); opacity: 0; }
}

/* ✨ MARI BRILHANDO */
.mari {
    color: #fff;
    font-weight: bold;
    text-shadow: 0 0 10px #ff4da6, 0 0 20px #ff4da6;
    animation: brilho 1.5s ease-in-out infinite;
}

@keyframes brilho {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
}
</style>

</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
    RAFAEL × <span class="mari">MARI</span>
    <p>Preparando algo especial...</p>
</div>

<!-- 🎵 MÚSICA -->
<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- 💌 CONTEÚDO -->
<div class="container">

    <div class="carta">

        <h1>Para <span class="mari">Mari</span> ❤️</h1>

        <div class="texto" id="texto"></div>

    </div>

</div>

<script>

const textoFinal = `Talvez você não imagine...
mas desde que você apareceu, tudo ficou mais leve.

Você virou meu pensamento favorito.

E isso não mudou.

Com carinho,
Rafael ❤️`;

let i = 0;

/* 🎬 INÍCIO CINEMA */
window.addEventListener("load", () => {

    // 🎵 música com fade in
    const musica = document.getElementById("musica");
    musica.volume = 0;
    
    setTimeout(() => {
        musica.play();

        let fade = setInterval(() => {
            if (musica.volume < 0.8) {
                musica.volume += 0.05;
            } else {
                clearInterval(fade);
            }
        }, 200);

    }, 3500); // depois da intro

    // ✍️ escrita sincronizada
    setTimeout(escrever, 4000);
});

/* ✍️ efeito máquina de escrever */
function escrever() {
    if (i < textoFinal.length) {
        document.getElementById("texto").innerHTML += textoFinal.charAt(i);
        i++;
        setTimeout(escrever, 40);
    }
}

/* ❤️ corações */
for (let i = 0; i < 25; i++) {
    let c = document.createElement("div");
    c.className = "coracao";
    c.innerHTML = "❤️";
    c.style.left = Math.random() * 100 + "vw";
    c.style.animationDuration = (4 + Math.random() * 3) + "s";
    document.body.appendChild(c);
}

</script>

</body>
</html>
