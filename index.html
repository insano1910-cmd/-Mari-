<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mari ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
}

/* 🎬 INTRO NETFLIX */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
    color: #e50914;
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 3px;
    animation: introFade 3s ease forwards;
}

#intro p {
    font-size: 14px;
    color: white;
    opacity: 0.7;
    margin-top: 10px;
}

@keyframes introFade {
    0% { opacity: 0; transform: scale(1.3); }
    20% { opacity: 1; transform: scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
}

/* 🌸 CONTEÚDO */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
}

/* 💌 CARTA */
.carta {
    background: white;
    width: 85%;
    max-width: 750px;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);

    opacity: 0;
    transform: scale(0.9);
    animation: aparecer 1.2s ease forwards;
    animation-delay: 3.2s;
}

@keyframes aparecer {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* 💖 TEXTO */
h1 {
    color: #e91e63;
    text-align: center;
    margin-bottom: 20px;
}

.texto {
    font-size: 20px;
    line-height: 1.8;
    color: #444;
    margin-bottom: 20px;
}

/* ✨ MARI */
.mari {
    color: #fff;
    font-weight: bold;
    text-shadow: 0 0 10px #ff4da6, 0 0 20px #ff4da6;
    animation: brilho 1.5s ease-in-out infinite;
}

@keyframes brilho {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
}

/* ❤️ CORAÇÕES */
.coracao {
    position: absolute;
    color: white;
    animation: subir 6s linear infinite;
}

@keyframes subir {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-120px); opacity: 0; }
}

/* 💌 BOTÃO */
button {
    display: block;
    margin: 0 auto;
    margin-top: 20px;
    padding: 15px 30px;
    border: none;
    border-radius: 30px;
    background: #e91e63;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
</style>

</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
    RAFAEL × <span class="mari">MARI</span>
    <p>Preparando sua experiência...</p>
</div>

<!-- 🎵 MÚSICA -->
<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- 💌 CONTEÚDO -->
<div class="container">

    <div class="carta">

        <h1>Para <span class="mari">Mari</span> ❤️</h1>

        <p class="texto" id="texto">
            Talvez você não imagine... mas desde que você apareceu, tudo ficou melhor.
        </p>

        <button onclick="abrirCarta()">💌 Abrir Carta</button>

    </div>

</div>

<script>

let i = 0;
const textoFinal = `Você se tornou meu pensamento favorito.

E isso não mudou.

Com carinho,
Rafael ❤️`;

function abrirCarta() {

    document.querySelector("button").style.display = "none";

    // 🎵 música com fade
    const musica = document.getElementById("musica");
    musica.volume = 0;
    musica.play();

    let fade = setInterval(() => {
        if (musica.volume < 0.8) {
            musica.volume += 0.05;
        } else {
            clearInterval(fade);
        }
    }, 200);

    escrever();
}

/* ✍️ escrita */
function escrever() {
    if (i < textoFinal.length) {
        document.getElementById("texto").innerHTML += textoFinal.charAt(i);
        i++;
        setTimeout(escrever, 40);
    }
}

/* ❤️ corações */
for (let i = 0; i < 25; i++) {
    let c = document.createElement("div");
    c.className = "coracao";
    c.innerHTML = "❤️";
    c.style.left = Math.random() * 100 + "vw";
    c.style.animationDuration = (4 + Math.random() * 3) + "s";
    document.body.appendChild(c);
}

</script>

</body>
</html>
