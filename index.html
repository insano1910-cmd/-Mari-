<script>

/* 💬 APENAS 1 FRASE */
const fraseUnica = "Eu não sou qualquer um… e isso aqui não é qualquer coisa.";

function mostrarFraseUnica() {

    const container = document.getElementById("frases");

    const p = document.createElement("div");
    p.className = "frase";
    p.innerText = fraseUnica;

    container.appendChild(p);

    setTimeout(() => {
        p.style.opacity = 1;
        p.style.transform = "translateY(0)";
    }, 100);

    // ⏳ some depois de um tempo
    setTimeout(() => {
        p.style.opacity = 0;

        setTimeout(() => {
            container.innerHTML = ""; // limpa

            // 🔥 mostra botão depois que sumir
            document.querySelector("button").style.display = "inline-block";
        }, 800);

    }, 2500);
}

/* 🎬 depois da intro */
setTimeout(mostrarFraseUnica, 3000);

</script>
