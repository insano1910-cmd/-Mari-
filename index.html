<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mari ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-x: hidden;
    overflow-y: auto;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    padding: 20px 0;
}

.container {
    background: rgba(255,255,255,0.96);
    width: 90%;
    max-width: 750px;
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,.2);
}

h1 {
    color: #e91e63;
    margin-bottom: 20px;
}

.intro {
    color: #555;
    font-size: 22px;
    line-height: 1.6;
}

button {
    margin-top: 30px;
    background: #e91e63;
    color: white;
    border: none;
    padding: 15px 35px;
    font-size: 20px;
    border-radius: 30px;
    cursor: pointer;
    transition: .3s;
}

button:hover {
    transform: scale(1.05);
}

#mensagem {
    display: none;
    margin-top: 35px;
    animation: aparecer 1.5s ease;
}

.texto {
    font-size: 22px;
    line-height: 1.9;
    color: #444;
}

.destaque {
    display: block;
    margin: 20px 0;
    font-size: 34px;
    font-weight: bold;
    color: #e91e63;
}

.assinatura {
    margin-top: 20px;
    font-size: 24px;
}

@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.coracao {
    position: absolute;
    color: white;
    animation: subir 8s linear infinite;
}

@keyframes subir {
    0% {
        transform: translateY(100vh);
        opacity: 1;
    }
    100% {
        transform: translateY(-120px);
        opacity: 0;
    }
}

/* ✨ BRILHO DA MARI */
.mari {
    color: #fff;
    font-weight: bold;
    text-shadow: 0 0 8px #ff4da6,
                 0 0 18px #ff4da6,
                 0 0 30px #ff1a8c;
    animation: brilho 1.6s ease-in-out infinite;
}

@keyframes brilho {
    0%, 100% {
        transform: scale(1);
        text-shadow: 0 0 6px #ff4da6, 0 0 12px #ff4da6;
    }
    50% {
        transform: scale(1.08);
        text-shadow: 0 0 20px #ff4da6, 0 0 40px #ff1a8c;
    }
}
</style>

</head>

<body>

<!-- 🎵 ÁUDIO (MÚSICA LOCAL) -->
<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>Para <span class="mari">Mari</span> ❤️</h1>

<p class="intro">
    Se você chegou até aqui, é porque isso foi feito especialmente pra você ❤️
</p>

<button onclick="mostrarMensagem()">
    💌 Abrir Carta
</button>

<div id="mensagem">

    <hr style="margin:25px 0; border:none; border-top:1px solid #ddd;">

    <p class="texto">
        Talvez você não imagine, mas desde que você apareceu, meus dias ficaram mais leves...

        <br><br>

        Você se tornou alguém muito especial para mim.

        <br><br>

        <span class="destaque">
            Você é o meu pensamento favorito. ❤️
        </span>

        Com carinho,<br><br>
        Rafael ❤️
    </p>

</div>

</div>

<script>

function mostrarMensagem() {

    // esconde botão
    document.querySelector("button").style.display = "none";

    // mostra carta
    const mensagem = document.getElementById("mensagem");
    mensagem.style.display = "block";

    mensagem.scrollIntoView({ behavior: "smooth" });

    // 🎵 música ao clicar (SEM BLOQUEIO)
    const musica = document.getElementById("musica");
    musica.volume = 0.8;
    musica.play().catch(() => {
        console.log("Autoplay bloqueado, mas iniciado pelo clique.");
    });
}

// ❤️ corações animados
for (let i = 0; i < 20; i++) {
    let coracao = document.createElement("div");
    coracao.className = "coracao";
    coracao.innerHTML = "❤️";

    coracao.style.left = Math.random() * 100 + "vw";
    coracao.style.fontSize = (15 + Math.random() * 25) + "px";
    coracao.style.animationDelay = Math.random() * 8 + "s";

    document.body.appendChild(coracao);
}

</script>

</body>
</html>
